<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background road -->
  <rect width="1200" height="630" fill="#5a5a5a"/>
  <!-- Lane lines -->
  <rect x="400" y="0" width="6" height="630" fill="rgba(255,255,255,0.35)"/>
  <rect x="800" y="0" width="6" height="630" fill="rgba(255,255,255,0.35)"/>
  <!-- Dashes -->
  <rect x="400" y="30"  width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="400" y="140" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="400" y="250" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="400" y="360" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="400" y="470" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="400" y="570" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="800" y="30"  width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="800" y="140" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="800" y="250" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="800" y="360" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="800" y="470" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <rect x="800" y="570" width="6" height="55" fill="rgba(255,255,255,0.5)"/>
  <!-- Curbs -->
  <rect x="0"    y="0" width="14" height="630" fill="#444"/>
  <rect x="1186" y="0" width="14" height="630" fill="#444"/>
  <!-- Dark overlay -->
  <rect width="1200" height="630" fill="rgba(0,0,0,0.52)"/>
  <!-- Obstacle emojis -->
  <text x="200" y="180" font-size="70" text-anchor="middle" dominant-baseline="middle">🏛️</text>
  <text x="600" y="120" font-size="70" text-anchor="middle" dominant-baseline="middle">📋</text>
  <text x="1000" y="200" font-size="70" text-anchor="middle" dominant-baseline="middle">🚧</text>
  <text x="200"  y="480" font-size="60" text-anchor="middle" dominant-baseline="middle">⭐</text>
  <text x="1000" y="480" font-size="60" text-anchor="middle" dominant-baseline="middle">🛡️</text>
  <!-- Car top-down -->
  <g transform="translate(600,400)">
    <rect x="-5" y="-8" width="46" height="84" rx="10" fill="rgba(0,0,0,0.2)"/>
    <rect x="-24" y="-78" width="48" height="148" rx="12" fill="#e24b4a"/>
    <rect x="-18" y="-78" width="36" height="36" rx="6" fill="#c03a39"/>
    <rect x="-14" y="-40" width="28" height="22" rx="4" fill="#87ceeb" opacity="0.85"/>
    <rect x="-13" y="-10" width="26" height="36" rx="4" fill="#f25554" opacity="0.9"/>
    <rect x="-14" y="30" width="28" height="14" rx="4" fill="#87ceeb" opacity="0.65"/>
    <rect x="-30" y="-66" width="10" height="22" rx="2" fill="#222"/>
    <rect x="20"  y="-66" width="10" height="22" rx="2" fill="#222"/>
    <rect x="-30" y="50"  width="10" height="22" rx="2" fill="#222"/>
    <rect x="20"  y="50"  width="10" height="22" rx="2" fill="#222"/>
    <circle cx="-16" cy="-75" r="5" fill="#FFD700"/>
    <circle cx="16"  cy="-75" r="5" fill="#FFD700"/>
    <circle cx="-16" cy="70"  r="5" fill="#ff4444"/>
    <circle cx="16"  cy="70"  r="5" fill="#ff4444"/>
  </g>
  <!-- Main title -->
  <text x="600" y="195" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="74" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Desvie da Burocracia!</text>
  <!-- Challenge badge -->
  <rect x="370" y="238" width="460" height="60" rx="30" fill="#e24b4a"/>
  <text x="600" y="269" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">🏆 Você foi desafiado!</text>
  <!-- Subtitle -->
  <text x="600" y="335" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.85)" text-anchor="middle" dominant-baseline="middle">Consegue superar o recorde?</text>
  <!-- Bottom bar -->
  <rect x="0" y="552" width="1200" height="78" fill="rgba(0,0,0,0.6)"/>
  <text x="600" y="591" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.8)" text-anchor="middle" dominant-baseline="middle">A Região de Americana Merece Mais</text>
</svg>
